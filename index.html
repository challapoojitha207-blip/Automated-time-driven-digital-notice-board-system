<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Channel Digital Notice Board</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAME SETUP SCREEN -->
<div id="nameSetup">
  <div class="setup-card">
    <div class="big-icon">👤</div>
    <h2>What's your name?</h2>
    <p>Your name will be shown on notices you post and visible to other channel members.</p>
    <input type="text" id="setupNameInput" placeholder="Enter your name..." maxlength="30">
    <button class="btn-setup" onclick="setupUser()">Get Started →</button>
  </div>
</div>

<header>
  <div class="header-icon">📢</div>
  <div>
    <h1>Digital Notice Board</h1>
    <p>Multi-channel announcements & alerts</p>
  </div>
  <div class="header-user">
    <span class="user-name-label" id="headerUserName"></span>
    <div class="user-avatar" id="headerAvatar"></div>
  </div>
</header>

<div class="container">

<aside class="sidebar">

<div class="panel">
<div class="panel-title">Create Channel</div>

<div class="input-row">
<input type="text" id="channelName" placeholder="Channel name..." maxlength="30">
<button class="btn-icon" onclick="createChannel()">+</button>
</div>

<div class="error-msg" id="channelError">Channel already exists.</div>
</div>

<div class="panel">

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
<span class="panel-title" style="margin-bottom:0;">My Channels</span>
<button class="btn-sm" onclick="openJoinModal()">🔍 Browse</button>
</div>

<div id="channelList"></div>

</div>

</aside>

<main class="main-board">

<div id="selectPrompt" class="select-prompt">
<div class="icon">👈</div>
<h3>Select a Channel</h3>
<p>Choose or create a channel to view and post notices.</p>
</div>

<div id="boardContent">

<div class="board-header">
<h2 id="currentChannelTitle"></h2>
</div>

<form id="noticeForm">

<input type="text" id="title" placeholder="Notice title..." required>

<textarea id="description" placeholder="Notice description..." required></textarea>

<input type="datetime-local" id="expiry" required>

<select id="priority" required>
<option value="">Select priority</option>
<option value="high">High</option>
<option value="medium">Medium</option>
<option value="low">Low</option>
</select>

<button type="submit">Post Notice</button>

</form>

<div id="noticeContainer"></div>

</div>

</main>

</div>

<script src="arraylogic.js"></script>
<script src="script.js"></script>

</body>
</html>
